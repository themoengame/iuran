<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Sistem Iuran RT - Debug</title>
    <style>
        * { box-sizing: border-box; font-family: system-ui, sans-serif; }
        body { background: #e9f0f5; margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; background: white; border-radius: 32px; padding: 24px; box-shadow: 0 12px 28px rgba(0,0,0,0.08); }
        h2 { font-size: 1.6rem; color: #1e3b4a; margin: 0 0 20px 0; border-left: 5px solid #2c7da0; padding-left: 20px; }
        h3 { font-size: 1.2rem; color: #1e4663; margin: 16px 0 12px 0; }
        button, .btn { background: #2c7da0; color: white; border: none; padding: 10px 20px; border-radius: 40px; cursor: pointer; font-weight: 600; margin: 4px; }
        button.danger { background: #c77d5e; }
        input, select { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #cfdee9; border-radius: 24px; font-size: 1rem; }
        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 16px; margin-bottom: 20px; }
        .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; margin-bottom: 24px; }
        .stat-card { background: #e9f0f5; padding: 14px; border-radius: 20px; text-align: center; }
        .stat-value { font-size: 26px; font-weight: bold; color: #2c7da0; }
        .hidden { display: none; }
        .role-selector { display: flex; gap: 12px; margin-bottom: 24px; }
        .role-btn { flex: 1; background: white; border: 2px solid #2c7da0; color: #2c7da0; }
        .role-btn.active { background: #2c7da0; color: white; }
        .msg { background: #e9f0f5; padding: 10px; border-radius: 20px; margin: 16px 0; text-align: center; font-family: monospace; white-space: pre-wrap; }
        .footer { font-size: 0.7rem; text-align: center; margin-top: 20px; }
        .debug-panel { background: #1e1e2f; color: #0f0; padding: 12px; border-radius: 16px; font-family: monospace; font-size: 12px; max-height: 200px; overflow: auto; margin-top: 20px; }
    </style>
</head>
<body>
<div class="container">
    <h2>🏠 Sistem Iuran RT (Debug Mode)</h2>

    <div class="role-selector" id="roleSelector">
        <button class="role-btn active" data-role="bendahara">📋 Bendahara RT</button>
        <button class="role-btn" data-role="anggota">👤 Anggota</button>
    </div>

    <!-- Login Bendahara -->
    <div id="loginBendaharaDiv">
        <div class="form-grid">
            <div><label>Pilih RT</label><select id="rtSelect"><option value="RT01">RT 01</option><option value="RT02">RT 02</option><option value="RT03">RT 03</option></select></div>
            <div><label>PIN Bendahara</label><input type="password" id="pinBendahara" placeholder="Default: 1234"></div>
        </div>
        <button onclick="loginBendahara()">Login sebagai Bendahara</button>
        <button onclick="resetAllSheets()" style="background:#c77d5e;">⚠️ Reset Semua Data</button>
    </div>

    <!-- Login Anggota -->
    <div id="loginAnggotaDiv" class="hidden">
        <div class="form-grid">
            <div><label>Nomor WhatsApp</label><input type="tel" id="noWa" placeholder="81234567890 atau 081234567890"></div>
            <div><label>PIN Anggota</label><input type="password" id="pinAnggota" placeholder="1111, 2222, dll"></div>
        </div>
        <button onclick="loginAnggota()">Login sebagai Anggota</button>
    </div>

    <!-- Dashboard setelah login (sederhana agar fokus) -->
    <div id="dashboardAfterLogin" class="hidden">
        <div id="simpleDashboard"></div>
        <button onclick="logout()" class="danger">Logout</button>
    </div>

    <!-- Panel Debug -->
    <div class="debug-panel" id="debugPanel">
        📡 Log akan muncul di sini dan juga di Console Browser (F12)
    </div>
    <div class="footer">💡 Gunakan nomor WA tanpa '0' di depan (contoh: 81234567890) atau dengan '0' (081234567890) keduanya akan dicoba.</div>
</div>

<script>
// GANTI DENGAN URL GAS ANDA
const GAS_URL = "https://script.google.com/macros/s/AKfycbyZsAmt1tl6d1Dv-W92dSrPmzu3TxX6J21UpPYUBtMm_Hbtbk6VlCp2xQmTA3kzP76c2Q/exec";

function addDebugLog(msg, isError = false) {
    const panel = document.getElementById('debugPanel');
    const time = new Date().toLocaleTimeString();
    const color = isError ? '#f99' : '#afa';
    panel.innerHTML += `<div style="color:${color}; border-bottom:1px solid #333; padding:4px;">[${time}] ${msg}</div>`;
    panel.scrollTop = panel.scrollHeight;
    console.log(msg);
}

function showMsg(msg, isError) {
    addDebugLog(msg, isError);
    // juga tampilkan di alert kecil? tidak perlu karena sudah ada debug panel
}

function callAPI(action, params, callback) {
    const callbackName = 'cb_' + Date.now() + '_' + Math.random().toString(36).substr(2, 8);
    let url = GAS_URL + '?action=' + encodeURIComponent(action) + '&callback=' + callbackName;
    for (let k in params) {
        if (params[k] !== undefined && params[k] !== null) {
            url += '&' + encodeURIComponent(k) + '=' + encodeURIComponent(params[k]);
        }
    }
    addDebugLog(`📤 REQUEST: ${action} dengan params: ${JSON.stringify(params)}`);
    window[callbackName] = function(data) {
        delete window[callbackName];
        document.body.removeChild(script);
        addDebugLog(`📥 RESPONSE (${action}): ${JSON.stringify(data).substring(0, 300)}`);
        callback(data);
    };
    const script = document.createElement('script');
    script.src = url;
    script.onerror = function() {
        delete window[callbackName];
        document.body.removeChild(script);
        addDebugLog(`❌ ERROR: Network error untuk action ${action}`, true);
        callback({ status: "error", message: "Network error" });
    };
    document.body.appendChild(script);
}

function resetAllSheets() {
    if (confirm('RESET SEMUA DATA?')) {
        callAPI('resetSheet', {}, function(res) {
            addDebugLog(`Reset sheet result: ${JSON.stringify(res)}`);
            if (res.status === 'success') alert(res.message);
            else alert('Gagal reset');
        });
    }
}

// Role handling
function setRole(role) {
    const btns = document.querySelectorAll('.role-btn');
    btns.forEach(btn => btn.classList.remove('active'));
    if (role === 'bendahara') {
        btns[0].classList.add('active');
        document.getElementById('loginBendaharaDiv').classList.remove('hidden');
        document.getElementById('loginAnggotaDiv').classList.add('hidden');
        document.getElementById('dashboardAfterLogin').classList.add('hidden');
    } else {
        btns[1].classList.add('active');
        document.getElementById('loginBendaharaDiv').classList.add('hidden');
        document.getElementById('loginAnggotaDiv').classList.remove('hidden');
        document.getElementById('dashboardAfterLogin').classList.add('hidden');
    }
}

document.getElementById('roleSelector').addEventListener('click', function(e) {
    const btn = e.target.closest('.role-btn');
    if (!btn) return;
    setRole(btn.getAttribute('data-role'));
});

// LOGIN BENDAHARA
function loginBendahara() {
    const rt = document.getElementById('rtSelect').value;
    const pin = document.getElementById('pinBendahara').value;
    addDebugLog(`🔐 Mencoba login bendahara: RT=${rt}, PIN=${pin}`);
    callAPI('loginBendahara', { rt: rt, pin: pin }, function(res) {
        addDebugLog(`Hasil login bendahara: valid=${res.valid}`);
        if (res.valid) {
            showMsg(`✅ Login bendahara ${rt} berhasil!`, false);
            document.getElementById('loginBendaharaDiv').classList.add('hidden');
            document.getElementById('dashboardAfterLogin').classList.remove('hidden');
            document.getElementById('simpleDashboard').innerHTML = `<h3>Dashboard Bendahara ${rt}</h3><p>Silakan lanjutkan dengan menu lain (fitur lengkap bisa ditambahkan). Login sukses.</p>`;
        } else {
            showMsg(`❌ Login gagal: PIN salah untuk RT ${rt}`, true);
        }
    });
}

// LOGIN ANGGOTA
function loginAnggota() {
    let noWa = document.getElementById('noWa').value.trim();
    const pin = document.getElementById('pinAnggota').value.trim();
    addDebugLog(`🔐 Mencoba login anggota: noWa=${noWa}, pin=${pin}`);
    // Kirim asli, biar GAS yang bersihkan
    callAPI('loginAnggota', { noWa: noWa, pin: pin }, function(res) {
        addDebugLog(`Hasil login anggota: valid=${res.valid}, data=${JSON.stringify(res)}`);
        if (res.valid) {
            showMsg(`✅ Login berhasil sebagai ${res.nama} (${res.rt})`, false);
            document.getElementById('loginAnggotaDiv').classList.add('hidden');
            document.getElementById('dashboardAfterLogin').classList.remove('hidden');
            document.getElementById('simpleDashboard').innerHTML = `<h3>Dashboard Anggota: ${res.nama}</h3><p>Tagihan dan laporan dapat dilihat di sini. Login sukses.</p>`;
        } else {
            showMsg(`❌ Login gagal: Nomor WA atau PIN salah. Coba no WA: 81234567890 atau 081234567890, PIN: 1111, 2222, dst.`, true);
            if (res.debug) addDebugLog(`Debug info: ${JSON.stringify(res.debug)}`);
        }
    });
}

function logout() {
    document.getElementById('dashboardAfterLogin').classList.add('hidden');
    setRole('bendahara');
    showMsg('Anda telah logout', false);
}

// Inisialisasi
setRole('bendahara');
</script>
</body>
</html>
