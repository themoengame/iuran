<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Sistem Iuran - RW & RT</title>
    <style>
        * { box-sizing: border-box; font-family: system-ui, 'Segoe UI', sans-serif; }
        body { background: #e9f0f5; margin: 0; padding: 20px; display: flex; justify-content: center; min-height: 100vh; }
        .container { max-width: 1000px; width: 100%; background: white; border-radius: 32px; padding: 24px; box-shadow: 0 12px 28px rgba(0,0,0,0.08); }
        h2 { font-size: 1.5rem; color: #1e3b4a; margin: 0 0 20px 0; border-left: 4px solid #2c7da0; padding-left: 16px; }
        h3 { font-size: 1.1rem; color: #1e4663; margin: 20px 0 12px 0; }
        .role-buttons { display: flex; gap: 12px; margin-bottom: 24px; }
        .role-btn { flex: 1; padding: 12px; border: 2px solid #2c7da0; background: white; border-radius: 40px; cursor: pointer; font-weight: bold; }
        .role-btn.active { background: #2c7da0; color: white; }
        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 16px; margin-bottom: 20px; }
        .input-group { display: flex; flex-direction: column; gap: 6px; }
        .input-group label { font-weight: 600; color: #1e4663; font-size: 0.8rem; }
        input, select { padding: 10px 14px; border: 1.5px solid #cfdee9; border-radius: 20px; font-size: 0.9rem; }
        button { background: #2c7da0; color: white; border: none; padding: 10px 24px; border-radius: 40px; font-weight: bold; cursor: pointer; }
        button.danger { background: #c77d5e; }
        button.success { background: #5e8b7e; }
        .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; margin-bottom: 20px; }
        .stat-card { background: #e9f0f5; padding: 12px; border-radius: 20px; text-align: center; }
        .stat-value { font-size: 22px; font-weight: bold; color: #2c7da0; }
        .stat-label { font-size: 11px; color: #5f7f8c; margin-top: 4px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 8px; text-align: left; border-bottom: 1px solid #cfdee9; }
        th { background: #e9f0f5; }
        .pagination { display: flex; gap: 6px; justify-content: center; margin-top: 16px; flex-wrap: wrap; }
        .page-btn { background: #e9f0f5; color: #2c7da0; padding: 6px 12px; min-width: 36px; }
        .page-btn.active { background: #2c7da0; color: white; }
        .warning { background: #fff7e5; border-left: 5px solid #f4b942; padding: 12px 18px; border-radius: 20px; margin: 16px 0; display: none; }
        .hidden { display: none; }
        .nav-tabs { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; border-bottom: 1px solid #cfdee9; padding-bottom: 12px; }
        .nav-tab { background: #e9f0f5; border: none; padding: 8px 20px; border-radius: 40px; cursor: pointer; }
        .nav-tab.active { background: #2c7da0; color: white; }
        .footer { font-size: 0.7rem; color: #5f7f8c; text-align: center; margin-top: 20px; }
        .badge { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 12px; }
        .badge-lunas { background: #e0f2e9; color: #2c7da0; }
        .badge-belum { background: #fff2e6; color: #c77d5e; }
    </style>
</head>
<body>
<div class="container">
    <h2>🏠 Sistem Iuran RW & RT</h2>
    
    <!-- Pilih Role -->
    <div class="role-buttons">
        <button class="role-btn" onclick="setRole('bendahara')">📋 Bendahara RT</button>
        <button class="role-btn" onclick="setRole('anggota')">👤 Anggota</button>
    </div>
    
    <!-- Login Bendahara -->
    <div id="loginBendaharaDiv">
        <div class="form-grid">
            <div class="input-group"><label>Pilih RT</label><select id="rtSelect"><option value="RT01">RT 01</option><option value="RT02">RT 02</option><option value="RT03">RT 03</option></select></div>
            <div class="input-group"><label>PIN Bendahara</label><input type="password" id="pinBendahara" placeholder="Default: 1234"></div>
        </div>
        <button onclick="loginBendahara()">Login sebagai Bendahara</button>
    </div>
    
    <!-- Login Anggota -->
    <div id="loginAnggotaDiv" class="hidden">
        <div class="form-grid">
            <div class="input-group"><label>Nomor WhatsApp</label><input type="tel" id="noWaAnggota" placeholder="081234567890"></div>
            <div class="input-group"><label>PIN Anggota</label><input type="password" id="pinAnggota" placeholder="4 digit PIN"></div>
        </div>
        <button onclick="loginAnggota()">Login sebagai Anggota</button>
    </div>
    
    <!-- Dashboard Bendahara -->
    <div id="dashboardBendahara" class="hidden">
        <div class="nav-tabs">
            <button class="nav-tab active" data-tab="b-dashboard">📊 Dashboard</button>
            <button class="nav-tab" data-tab="b-anggota">👥 Anggota</button>
            <button class="nav-tab" data-tab="b-tagihan">📝 Tagihan</button>
            <button class="nav-tab" data-tab="b-pengeluaran">💰 Kas Keluar</button>
        </div>
        <div id="b-dashboard">
            <div id="bStats" class="stats">Memuat data...</div>
        </div>
        <div id="b-anggota" class="hidden">
            <h3>➕ Tambah Anggota</h3>
            <div class="form-grid"><input type="text" id="namaAnggota" placeholder="Nama"><input type="tel" id="waAnggota" placeholder="No WA"></div>
            <button onclick="tambahAnggota()">Simpan Anggota</button>
            <h3>📋 Daftar Anggota</h3>
            <div id="daftarAnggota"></div>
            <div id="paginationAnggota" class="pagination"></div>
        </div>
        <div id="b-tagihan" class="hidden">
            <h3>💰 Buat Tagihan</h3>
            <div class="form-grid"><input type="month" id="bulanTagihan"></div>
            <button onclick="buatTagihan()">Buat Tagihan</button>
            <h3>📋 Daftar Tagihan</h3>
            <div id="daftarTagihan"></div>
        </div>
        <div id="b-pengeluaran" class="hidden">
            <h3>📤 Catat Pengeluaran</h3>
            <div class="form-grid">
                <input type="date" id="tglPengeluaran"><input type="text" id="kategori" placeholder="Kategori"><input type="text" id="deskripsi" placeholder="Deskripsi"><input type="number" id="jumlah" placeholder="Jumlah">
            </div>
            <button onclick="tambahPengeluaran()">Simpan Pengeluaran</button>
            <h3>📋 Riwayat Pengeluaran</h3>
            <div id="daftarPengeluaran"></div>
        </div>
    </div>
    
    <!-- Dashboard Anggota -->
    <div id="dashboardAnggota" class="hidden">
        <div class="nav-tabs">
            <button class="nav-tab active" data-tab="a-tagihan">📋 Tagihan Saya</button>
            <button class="nav-tab" data-tab="a-laporan">📊 Laporan Kas RT</button>
        </div>
        <div id="a-tagihan"><div id="tagihanSaya">Memuat data...</div></div>
        <div id="a-laporan" class="hidden"><div id="laporanKas">Memuat data...</div></div>
    </div>
    
    <div id="formFeedback" class="warning"></div>
    <div class="footer">💡 Bendahara: PIN 1234 | Anggota: PIN 1111 (contoh)</div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyZsAmt1tl6d1Dv-W92dSrPmzu3TxX6J21UpPYUBtMm_Hbtbk6VlCp2xQmTA3kzP76c2Q/exec";
    let currentRT = "RT01";
    let currentAnggotaId = "";
    let currentPageAnggota = 1;
    let totalPagesAnggota = 1;
    
    function showFeedback(msg, isError = true) {
        const fb = document.getElementById('formFeedback');
        fb.style.display = 'block';
        fb.innerHTML = isError ? `⚠️ ${msg}` : `✅ ${msg}`;
        fb.style.background = isError ? '#fff2e6' : '#e0f2e9';
        setTimeout(() => { fb.style.display = 'none'; }, 4000);
    }
    
    async function callAPI(action, params = {}) {
        let url = `${SCRIPT_URL}?action=${action}`;
        for(let key in params) url += `&${key}=${encodeURIComponent(params[key])}`;
        try {
            const response = await fetch(url);
            return await response.json();
        } catch(err) {
            showFeedback("Gagal terhubung: " + err.message);
            return { status: "error", message: err.message };
        }
    }
    
    function setRole(role) {
        document.querySelectorAll('.role-btn').forEach(btn => btn.classList.remove('active'));
        event.target.classList.add('active');
        if(role === 'bendahara') {
            document.getElementById('loginBendaharaDiv').classList.remove('hidden');
            document.getElementById('loginAnggotaDiv').classList.add('hidden');
            document.getElementById('dashboardBendahara').classList.add('hidden');
            document.getElementById('dashboardAnggota').classList.add('hidden');
        } else {
            document.getElementById('loginBendaharaDiv').classList.add('hidden');
            document.getElementById('loginAnggotaDiv').classList.remove('hidden');
            document.getElementById('dashboardBendahara').classList.add('hidden');
            document.getElementById('dashboardAnggota').classList.add('hidden');
        }
    }
    
    // BENDAHARA
    async function loginBendahara() {
        currentRT = document.getElementById('rtSelect').value;
        const pin = document.getElementById('pinBendahara').value;
        const result = await callAPI('loginBendahara', { rt: currentRT, pin: pin });
        if(result.status === 'success' && result.data.valid) {
            document.getElementById('loginBendaharaDiv').classList.add('hidden');
            document.getElementById('dashboardBendahara').classList.remove('hidden');
            showFeedback(`Login sebagai Bendahara ${currentRT}`, false);
            loadBDashboard();
            loadBAnggota();
            loadBTagihan();
            loadBPengeluaran();
        } else {
            showFeedback("PIN salah!");
        }
    }
    
    async function loadBDashboard() {
        const result = await callAPI('getDashboardBendahara', { rt: currentRT });
        if(result.status === 'success') {
            const d = result.data;
            document.getElementById('bStats').innerHTML = `
                <div class="stat-card"><div class="stat-value">${d.totalAnggota}</div><div class="stat-label">Anggota</div></div>
                <div class="stat-card"><div class="stat-value">${formatRupiah(d.totalTagihan)}</div><div class="stat-label">Tagihan</div></div>
                <div class="stat-card"><div class="stat-value">${formatRupiah(d.totalLunas)}</div><div class="stat-label">Terkumpul</div></div>
                <div class="stat-card"><div class="stat-value">${d.persenKepatuhan}%</div><div class="stat-label">Kepatuhan</div></div>
                <div class="stat-card"><div class="stat-value">${formatRupiah(d.saldoKas)}</div><div class="stat-label">Saldo Kas</div></div>
            `;
        }
    }
    
    async function loadBAnggota(page = 1) {
        currentPageAnggota = page;
        const result = await callAPI('getAnggota', { rt: currentRT, page: page });
        if(result.status === 'success') {
            totalPagesAnggota = result.totalPages;
            let html = '<table><th>Nama</th><th>No WA</th><th>Status</th><th>Aksi</th></tr>';
            result.data.forEach(a => {
                html += `<tr><td>${a.nama}</td><td>${a.no_wa || '-'}</td><td>${a.status}</td><td><button class="danger" onclick="hapusAnggota('${a.id}')">Hapus</button></td></tr>`;
            });
            document.getElementById('daftarAnggota').innerHTML = '<table>' + html + '</table>';
            let paginHtml = '';
            for(let i=1; i<=totalPagesAnggota; i++) paginHtml += `<button class="page-btn ${i===page?'active':''}" onclick="loadBAnggota(${i})">${i}</button>`;
            document.getElementById('paginationAnggota').innerHTML = paginHtml;
        }
    }
    
    async function tambahAnggota() {
        const nama = document.getElementById('namaAnggota').value;
        const no_wa = document.getElementById('waAnggota').value;
        if(!nama) return showFeedback("Nama wajib diisi");
        const result = await callAPI('tambahAnggota', { rt: currentRT, nama, no_wa });
        if(result.status === 'success') {
            showFeedback(`Anggota ditambahkan. PIN: ${result.pin}`, false);
            document.getElementById('namaAnggota').value = '';
            document.getElementById('waAnggota').value = '';
            loadBAnggota(1);
            loadBDashboard();
        }
    }
    
    async function hapusAnggota(id) {
        if(confirm('Hapus anggota ini?')) {
            const result = await callAPI('hapusAnggota', { id });
            if(result.status === 'success') { loadBAnggota(currentPageAnggota); loadBDashboard(); }
        }
    }
    
    async function loadBTagihan() {
        const result = await callAPI('getTagihan', { rt: currentRT });
        if(result.status === 'success') {
            if(result.data.length === 0) { document.getElementById('daftarTagihan').innerHTML = '<p>Belum ada tagihan. Buat tagihan dulu.</p>'; return; }
            let html = '<table><th>Jenis Iuran</th><th>Nominal</th><th>Status</th><th>Aksi</th></tr>';
            for(const t of result.data) {
                html += `<tr><td>${t.jenis_iuran_id}</td><td>${formatRupiah(t.nominal)}</td><td><span class="badge ${t.status==='Lunas'?'badge-lunas':'badge-belum'}">${t.status}</span></td>
                        <td>${t.status !== 'Lunas' ? `<button class="success" onclick="verifikasiBayar('${t.id}')">Verifikasi</button>` : '-'}</td></tr>`;
            }
            document.getElementById('daftarTagihan').innerHTML = '<table>' + html + '</table>';
        }
    }
    
    async function buatTagihan() {
        const bulan = document.getElementById('bulanTagihan').value || new Date().toISOString().slice(0,7);
        const result = await callAPI('buatTagihan', { rt: currentRT, bulan });
        if(result.status === 'success') { showFeedback(result.message, false); loadBTagihan(); loadBDashboard(); }
    }
    
    async function verifikasiBayar(id) {
        const result = await callAPI('verifikasiBayar', { id });
        if(result.status === 'success') { showFeedback("Pembayaran diverifikasi", false); loadBTagihan(); loadBDashboard(); }
    }
    
    async function loadBPengeluaran() {
        const result = await callAPI('getPengeluaran', { rt: currentRT });
        if(result.status === 'success') {
            if(result.data.length === 0) { document.getElementById('daftarPengeluaran').innerHTML = '<p>Belum ada pengeluaran.</p>'; return; }
            let html = '</table><th>Tanggal</th><th>Kategori</th><th>Deskripsi</th><th>Jumlah</th></tr>';
            for(const p of result.data) html += `<tr><td>${p.tanggal}</td><td>${p.kategori}</td><td>${p.deskripsi}</td><td>${formatRupiah(p.jumlah)}</td></tr>`;
            document.getElementById('daftarPengeluaran').innerHTML = '<table>' + html + '</table>';
        }
    }
    
    async function tambahPengeluaran() {
        const tanggal = document.getElementById('tglPengeluaran').value;
        const kategori = document.getElementById('kategori').value;
        const deskripsi = document.getElementById('deskripsi').value;
        const jumlah = document.getElementById('jumlah').value;
        if(!tanggal || !kategori || !jumlah) return showFeedback("Lengkapi semua field");
        const result = await callAPI('tambahPengeluaran', { rt: currentRT, tanggal, kategori, deskripsi, jumlah });
        if(result.status === 'success') {
            showFeedback("Pengeluaran dicatat", false);
            document.getElementById('tglPengeluaran').value = '';
            document.getElementById('kategori').value = '';
            document.getElementById('deskripsi').value = '';
            document.getElementById('jumlah').value = '';
            loadBPengeluaran();
            loadBDashboard();
        }
    }
    
    // ANGGOTA
    async function loginAnggota() {
        const noWa = document.getElementById('noWaAnggota').value;
        const pin = document.getElementById('pinAnggota').value;
        const result = await callAPI('loginAnggota', { noWa, pin });
        if(result.status === 'success' && result.data.valid) {
            currentAnggotaId = result.data.anggotaId;
            currentRT = result.data.rt;
            document.getElementById('loginAnggotaDiv').classList.add('hidden');
            document.getElementById('dashboardAnggota').classList.remove('hidden');
            showFeedback(`Selamat datang ${result.data.nama} (${currentRT})`, false);
            loadTagihanSaya();
            loadLaporanKas();
        } else {
            showFeedback("Nomor WA atau PIN salah. Coba: 081234567890 / 1111");
        }
    }
    
    async function loadTagihanSaya() {
        const result = await callAPI('getTagihanSaya', { anggotaId: currentAnggotaId });
        if(result.status === 'success') {
            if(result.data.length === 0) { document.getElementById('tagihanSaya').innerHTML = '<p>Belum ada tagihan.</p>'; return; }
            let html = '<tr><th>Bulan</th><th>Jenis Iuran</th><th>Nominal</th><th>Status</th><th>Jatuh Tempo</th><th>Aksi</th></tr>';
            for(const t of result.data) {
                html += `<tr><td>${t.bulan}</td><td>${t.jenis_iuran_id}</td><td>${formatRupiah(t.nominal)}</td>
                        <td><span class="badge ${t.status==='Lunas'?'badge-lunas':'badge-belum'}">${t.status}</span></td>
                        <td>${t.tgl_jatuh_tempo || '-'}</td>
                        <td>${t.status !== 'Lunas' ? `<button class="success" onclick="laporBayar('${t.id}')">Lapor Bayar</button>` : '-'}</td></tr>`;
            }
            document.getElementById('tagihanSaya').innerHTML = '<table>' + html + '</table>';
        }
    }
    
    async function laporBayar(tagihanId) {
        if(confirm('Konfirmasi sudah transfer? Bendahara akan memverifikasi.')) {
            const result = await callAPI('laporBayar', { tagihanId, bukti: 'Lapor via Web' });
            if(result.status === 'success') { showFeedback("Laporan terkirim! Menunggu verifikasi bendahara.", false); loadTagihanSaya(); }
        }
    }
    
    async function loadLaporanKas() {
        const result = await callAPI('getLaporanKas', { rt: currentRT });
        if(result.status === 'success') {
            const d = result.data;
            let html = `<div class="stats"><div class="stat-card"><div class="stat-value">${formatRupiah(d.totalPemasukan)}</div><div class="stat-label">Total Pemasukan</div></div>
                       <div class="stat-card"><div class="stat-value">${formatRupiah(d.totalPengeluaran)}</div><div class="stat-label">Total Pengeluaran</div></div>
                       <div class="stat-card"><div class="stat-value">${formatRupiah(d.saldoKas)}</div><div class="stat-label">Saldo Kas</div></div></div>`;
            html += '<h3>📥 Rincian Pemasukan</h3><table><tr><th>Tanggal</th><th>Keterangan</th><th>Jumlah</th></tr>';
            for(const p of d.pemasukanList) html += `<tr><td>${p.tanggal}</td><td>${p.keterangan}</td><td>${formatRupiah(p.jumlah)}</td></tr>`;
            html += '</table><h3>📤 Rincian Pengeluaran</h3><table><tr><th>Tanggal</th><th>Keterangan</th><th>Jumlah</th></tr>';
            for(const p of d.pengeluaranList) html += `<tr><td>${p.tanggal}</td><td>${p.keterangan}</td><td>${formatRupiah(p.jumlah)}</td></tr>`;
            html += '</table>';
            document.getElementById('laporanKas').innerHTML = html;
        }
    }
    
    function formatRupiah(angka) { return 'Rp ' + new Intl.NumberFormat('id-ID').format(angka || 0); }
    
    // Navigasi tab bendahara
    document.querySelectorAll('.nav-tab').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.nav-tab').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            const tab = btn.dataset.tab;
            document.querySelectorAll('#b-dashboard, #b-anggota, #b-tagihan, #b-pengeluaran, #a-tagihan, #a-laporan').forEach(t => t.classList.add('hidden'));
            document.getElementById(tab).classList.remove('hidden');
        });
    });
    
    document.getElementById('tglPengeluaran').value = new Date().toISOString().slice(0,10);
    document.getElementById('bulanTagihan').value = new Date().toISOString().slice(0,7);
    document.querySelector('.role-btn').click();
</script>
</body>
</html>
