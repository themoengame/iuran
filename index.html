<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Iuran Multi-RT</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f0f2f5; padding: 16px; }
        .container { max-width: 800px; margin: 0 auto; }
        .card { background: white; border-radius: 16px; padding: 20px; margin-bottom: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        h2, h3 { margin-bottom: 16px; color: #1e3c72; }
        button { background: #2a5298; color: white; border: none; padding: 12px; border-radius: 10px; font-size: 16px; cursor: pointer; width: 100%; margin-top: 8px; }
        button.danger { background: #dc3545; }
        input, select { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 10px; font-size: 16px; }
        .hidden { display: none; }
        .stats { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-bottom: 16px; }
        .stat { background: #e9ecef; padding: 12px; border-radius: 12px; text-align: center; }
        .stat-value { font-size: 24px; font-weight: bold; color: #2a5298; }
        .stat-label { font-size: 12px; color: #666; margin-top: 4px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 10px; text-align: left; border-bottom: 1px solid #eee; }
        .nav { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
        .nav-btn { background: #e9ecef; color: #333; width: auto; padding: 8px 16px; margin: 0; }
        .nav-btn.active { background: #2a5298; color: white; }
        .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #333; color: white; padding: 10px 20px; border-radius: 8px; z-index: 1000; }
    </style>
</head>
<body>
<div class="container">
    <!-- Login Screen -->
    <div id="loginScreen" class="card">
        <h2>🏠 Sistem Iuran RT</h2>
        <p style="margin-bottom: 16px; color: #666;">Pilih RT dan masukkan PIN Bendahara</p>
        <select id="selectRT">
            <option value="RT01">RT 01</option>
            <option value="RT02">RT 02</option>
            <option value="RT03">RT 03</option>
        </select>
        <input type="password" id="pinInput" placeholder="PIN (default: 1234)">
        <button onclick="login()">Login</button>
    </div>
    
    <!-- Main App -->
    <div id="mainApp" class="hidden">
        <div class="card">
            <h2 id="rtTitle">🏠 RT</h2>
            <div class="nav">
                <button class="nav-btn active" data-tab="dashboard">📊 Dashboard</button>
                <button class="nav-btn" data-tab="anggota">👥 Anggota</button>
                <button class="nav-btn" data-tab="tagihan">📝 Tagihan</button>
                <button class="nav-btn" data-tab="pengeluaran">💰 Kas Keluar</button>
            </div>
        </div>
        
        <!-- Dashboard Tab -->
        <div id="dashboardTab" class="tab-content">
            <div class="card">
                <h3>Ringkasan Keuangan</h3>
                <div id="dashboardStats" class="stats"></div>
            </div>
        </div>
        
        <!-- Anggota Tab -->
        <div id="anggotaTab" class="tab-content hidden">
            <div class="card">
                <h3>➕ Tambah Anggota</h3>
                <input type="text" id="namaAnggota" placeholder="Nama lengkap">
                <input type="tel" id="noWaAnggota" placeholder="Nomor WhatsApp">
                <button onclick="tambahAnggota()">Simpan</button>
            </div>
            <div class="card">
                <h3>📋 Daftar Anggota</h3>
                <div id="daftarAnggota"></div>
                <div id="paginationAnggota" style="display: flex; gap: 8px; margin-top: 16px; justify-content: center;"></div>
            </div>
        </div>
        
        <!-- Tagihan Tab -->
        <div id="tagihanTab" class="tab-content hidden">
            <div class="card">
                <h3>💰 Buat Tagihan Bulanan</h3>
                <input type="month" id="bulanTagihan" value="2026-06">
                <button onclick="buatTagihan()">Buat Tagihan</button>
            </div>
            <div class="card">
                <h3>📋 Daftar Tagihan</h3>
                <div id="daftarTagihan"></div>
            </div>
        </div>
        
        <!-- Pengeluaran Tab -->
        <div id="pengeluaranTab" class="tab-content hidden">
            <div class="card">
                <h3>📤 Catat Pengeluaran</h3>
                <input type="date" id="tglPengeluaran">
                <input type="text" id="kategoriPengeluaran" placeholder="Kategori (Contoh: Konsumsi, Perbaikan)">
                <input type="text" id="deskripsiPengeluaran" placeholder="Deskripsi">
                <input type="number" id="jumlahPengeluaran" placeholder="Jumlah (Rp)">
                <button onclick="tambahPengeluaran()">Simpan</button>
            </div>
            <div class="card">
                <h3>📋 Riwayat Pengeluaran</h3>
                <div id="daftarPengeluaran"></div>
            </div>
        </div>
    </div>
</div>

<script>
    // GANTI DENGAN URL GAS ANDA
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbyZsAmt1tl6d1Dv-W92dSrPmzu3TxX6J21UpPYUBtMm_Hbtbk6VlCp2xQmTA3kzP76c2Q/exec';
    
    let currentRT = 'RT01';
    let currentPageAnggota = 1;
    let totalPagesAnggota = 1;
    
    function showToast(msg) {
        const existing = document.querySelector('.toast');
        if(existing) existing.remove();
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.textContent = msg;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }
    
    async function callAPI(action, params = {}) {
        params.action = action;
        params.rt = currentRT;
        const url = GAS_URL + '?' + new URLSearchParams(params).toString();
        try {
            const response = await fetch(url);
            return await response.json();
        } catch(e) {
            showToast('Error: ' + e.message);
            return {status: 'error', message: e.message};
        }
    }
    
    async function login() {
        const pin = document.getElementById('pinInput').value;
        currentRT = document.getElementById('selectRT').value;
        const result = await callAPI('login', {pin: pin});
        if(result.status === 'success') {
            document.getElementById('loginScreen').classList.add('hidden');
            document.getElementById('mainApp').classList.remove('hidden');
            document.getElementById('rtTitle').innerHTML = `🏠 ${currentRT} - ${result.message}`;
            loadDashboard();
            loadAnggota();
            loadTagihan();
            loadPengeluaran();
        } else {
            showToast('PIN salah!');
        }
    }
    
    async function loadDashboard() {
        const result = await callAPI('dashboard');
        if(result.status === 'success') {
            const d = result.data;
            document.getElementById('dashboardStats').innerHTML = `
                <div class="stat"><div class="stat-value">${d.totalAnggota}</div><div class="stat-label">Anggota Aktif</div></div>
                <div class="stat"><div class="stat-value">${formatRupiah(d.totalTagihan)}</div><div class="stat-label">Total Tagihan</div></div>
                <div class="stat"><div class="stat-value">${formatRupiah(d.totalLunas)}</div><div class="stat-label">Sudah Bayar</div></div>
                <div class="stat"><div class="stat-value">${d.persenKepatuhan}%</div><div class="stat-label">Kepatuhan</div></div>
                <div class="stat"><div class="stat-value">${formatRupiah(d.totalPemasukan)}</div><div class="stat-label">Total Pemasukan</div></div>
                <div class="stat"><div class="stat-value">${formatRupiah(d.totalPengeluaran)}</div><div class="stat-label">Pengeluaran</div></div>
                <div class="stat"><div class="stat-value">${formatRupiah(d.saldoKas)}</div><div class="stat-label">Saldo Kas</div></div>
                <div class="stat"><div class="stat-value">${formatRupiah(d.totalBelum)}</div><div class="stat-label">Belum Bayar</div></div>
            `;
        }
    }
    
    async function loadAnggota(page = 1) {
        currentPageAnggota = page;
        const result = await callAPI('anggota', {page: page});
        if(result.status === 'success') {
            totalPagesAnggota = result.totalPages;
            let html = '<table><tr><th>Nama</th><th>No WA</th><th>Aksi</th></tr>';
            result.data.forEach(a => {
                html += `<tr>
                    <td>${a.nama}</td>
                    <td>${a.no_wa || '-'}</td>
                    <td><button class="danger" style="padding:6px 12px;" onclick="hapusAnggota('${a.id}')">Hapus</button></td>
                </tr>`;
            });
            html += '</table>';
            document.getElementById('daftarAnggota').innerHTML = html;
            
            // Pagination
            let paginHtml = '';
            for(let i=1; i<=totalPagesAnggota; i++) {
                paginHtml += `<button class="${i === page ? 'active' : ''}" style="width:auto; padding:6px 12px;" onclick="loadAnggota(${i})">${i}</button>`;
            }
            document.getElementById('paginationAnggota').innerHTML = paginHtml;
        }
    }
    
    async function tambahAnggota() {
        const nama = document.getElementById('namaAnggota').value;
        const no_wa = document.getElementById('noWaAnggota').value;
        if(!nama) return showToast('Nama wajib diisi');
        
        const result = await callAPI('tambahAnggota', {nama, no_wa});
        if(result.status === 'success') {
            showToast('Anggota ditambahkan');
            document.getElementById('namaAnggota').value = '';
            document.getElementById('noWaAnggota').value = '';
            loadAnggota(1);
            loadDashboard();
        }
    }
    
    async function hapusAnggota(id) {
        if(confirm('Hapus anggota ini?')) {
            const result = await callAPI('hapusAnggota', {id});
            if(result.status === 'success') {
                showToast('Anggota dihapus');
                loadAnggota(currentPageAnggota);
                loadDashboard();
            }
        }
    }
    
    async function buatTagihan() {
        const bulan = document.getElementById('bulanTagihan').value;
        const result = await callAPI('buatTagihan', {bulan});
        showToast(result.message);
        loadDashboard();
        loadTagihan();
    }
    
    async function loadTagihan() {
        const result = await callAPI('tagihan');
        if(result.status === 'success') {
            if(result.data.length === 0) {
                document.getElementById('daftarTagihan').innerHTML = '<p style="color:#666;">Belum ada tagihan. Silakan buat tagihan terlebih dahulu.</p>';
                return;
            }
            let html = '<table><tr><th>Jenis Iuran</th><th>Nominal</th><th>Status</th><th>Aksi</th></tr>';
            // Kelompokkan berdasarkan jenis iuran (sederhana)
            for(const t of result.data) {
                html += `<tr>
                    <td>${t.jenis_iuran_id}</td>
                    <td>${formatRupiah(t.nominal)}</td>
                    <td><span style="background:${t.status === 'Lunas' ? '#d4edda' : '#f8d7da'}; padding:4px 8px; border-radius:12px;">${t.status}</span></td>
                    <td>${t.status !== 'Lunas' ? `<button onclick="verifikasiBayar('${t.id}')" style="background:#28a745; padding:6px 12px;">Verifikasi</button>` : '-'}</td>
                </tr>`;
            }
            html += '</table>';
            document.getElementById('daftarTagihan').innerHTML = html;
        }
    }
    
    async function verifikasiBayar(id) {
        const result = await callAPI('verifikasiBayar', {id});
        showToast(result.message);
        loadDashboard();
        loadTagihan();
    }
    
    async function loadPengeluaran() {
        const result = await callAPI('pengeluaran');
        if(result.status === 'success') {
            if(result.data.length === 0) {
                document.getElementById('daftarPengeluaran').innerHTML = '<p style="color:#666;">Belum ada pengeluaran.</p>';
                return;
            }
            let html = '<table><tr><th>Tanggal</th><th>Kategori</th><th>Deskripsi</th><th>Jumlah</th></tr>';
            for(const p of result.data) {
                html += `<tr>
                    <td>${p.tanggal}</td>
                    <td>${p.kategori}</td>
                    <td>${p.deskripsi}</td>
                    <td>${formatRupiah(p.jumlah)}</td>
                </tr>`;
            }
            html += '</table>';
            document.getElementById('daftarPengeluaran').innerHTML = html;
        }
    }
    
    async function tambahPengeluaran() {
        const tanggal = document.getElementById('tglPengeluaran').value;
        const kategori = document.getElementById('kategoriPengeluaran').value;
        const deskripsi = document.getElementById('deskripsiPengeluaran').value;
        const jumlah = document.getElementById('jumlahPengeluaran').value;
        
        if(!tanggal || !kategori || !jumlah) return showToast('Lengkapi data');
        
        const result = await callAPI('tambahPengeluaran', {tanggal, kategori, deskripsi, jumlah});
        if(result.status === 'success') {
            showToast('Pengeluaran dicatat');
            document.getElementById('tglPengeluaran').value = '';
            document.getElementById('kategoriPengeluaran').value = '';
            document.getElementById('deskripsiPengeluaran').value = '';
            document.getElementById('jumlahPengeluaran').value = '';
            loadDashboard();
            loadPengeluaran();
        }
    }
    
    function formatRupiah(angka) {
        if(!angka) return 'Rp 0';
        return 'Rp ' + new Intl.NumberFormat('id-ID').format(angka);
    }
    
    // Navigasi tab
    document.querySelectorAll('.nav-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            const tab = btn.dataset.tab;
            document.querySelectorAll('.tab-content').forEach(t => t.classList.add('hidden'));
            document.getElementById(`${tab}Tab`).classList.remove('hidden');
            
            if(tab === 'dashboard') loadDashboard();
            if(tab === 'anggota') loadAnggota(1);
            if(tab === 'tagihan') loadTagihan();
            if(tab === 'pengeluaran') loadPengeluaran();
        });
    });
    
    // Set default date
    document.getElementById('tglPengeluaran').value = new Date().toISOString().slice(0,10);
    document.getElementById('bulanTagihan').value = new Date().toISOString().slice(0,7);
</script>
</body>
</html>
